<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Relatório de Vendas</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu ativo"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}" class="sidebar-logo" alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="card-sistema p-3 p-md-4">

                    <h1 class="titulo mb-4">📊 Relatório do dia</h1>

                    <!-- CARDS DE RESUMO -->
                    <div class="row align-items-center mb-3 g-3">

                        <div class="col-12 col-md-3">
                            <div class="card-resumo">
                                <span>📅 Data</span>
                                <strong id="dataRelatorio">--</strong>
                            </div>
                        </div>

                        <div class="col-12 col-md-3">
                            <div class="card-resumo">
                                <span>🧾 Pedidos</span>
                                <strong id="totalPedidos">0</strong>
                            </div>
                        </div>

                        <div class="col-12 col-md-3">
                            <div class="card-resumo destaque">
                                <span>💰 Vendas</span>
                                <strong>R$ <span id="totalVendas">0.00</span></strong>
                            </div>
                        </div>

                        <div class="col-12 col-md-3 text-md-end">
                            <button id="btnImprimirRelatorio" class="btn-pink btn-imprimir">
                                🖨️ Imprimir
                            </button>
                        </div>

                    </div>

                    <div class="row g-3 mb-4">

                        <div class="col-12 col-md-6">
                            <label for="filtroPagamento">Pagamento</label>

                            <select id="filtroPagamento" class="form-select">
                                <option value="">Todos</option>
                                <option>Dinheiro</option>
                                <option>Débito</option>
                                <option>Crédito</option>
                                <option>VR/VA</option>
                                <option>PIX</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="filtroUsuario">Usuário</label>

                            <input type="text"
                                   id="filtroUsuario"
                                   class="form-control"
                                   placeholder="Nome ou cargo do usuário">
                        </div>

                    </div>

                    <div class="tabela-relatorio-scroll">

                        <table class="table table-hover align-middle tabela-relatorio">
                            <thead class="table-light">
                                <tr>
                                    <th>Número</th>
                                    <th>Data/Hora</th>
                                    <th>Pagamento</th>
                                    <th class="text-end">Total</th>
                                    <th>Usuário</th>
                                    <th class="text-center">Detalhes</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-4">
                                        Nenhuma venda registrada hoje
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                    </div>

                    <div class="paginacao">
                        <button id="btnAnterior" class="btn-paginacao">⬅</button>
                        <span id="paginaAtual">1</span>
                        <button id="btnProximo" class="btn-paginacao">➡</button>
                    </div>

                </div>

            </div>

        </main>

        <div id="modalConfirmacao" class="modal">
            <div class="modal-content">
                <h2 id="modalTexto">Confirmação</h2>

                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button id="btnSim" class="btn-pink">SIM</button>
                    <button id="btnNao" class="btn-cancelar">NÃO</button>
                </div>
            </div>
        </div>

        <div id="modalDetalhes" class="modal">
            <div class="modal-content">

                <h3>Detalhes do Pedido</h3>

                <div id="detalhesPedido" style="margin-top:15px;"></div>

                <div class="modal-botoes">
                    <button id="btnFecharDetalhes" class="btn-cancelar">
                        FECHAR
                    </button>
                </div>

            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script th:src="@{/js/ui.js}"></script>
        <script th:src="@{/js/relatorio.js}"></script>

    </body>
</html>
