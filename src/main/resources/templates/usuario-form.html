<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro de Usuário</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu ativo"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}"
                     class="sidebar-logo"
                     alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="row justify-content-center">

                    <div class="col-12 col-md-8 col-lg-6">

                        <div class="card-sistema p-3 p-md-4">

                            <h1 class="titulo mb-3 text-center">
                                Cadastro de Usuário
                            </h1>

                            <div th:if="${erro}"
                                 class="alerta-form"
                                 th:text="${erro}">
                            </div>

                            <form id="formUsuario"
                                  th:action="@{/usuarios/salvar}"
                                  th:object="${usuario}"
                                  method="post"
                                  novalidate>

                                <input type="hidden" th:field="*{id}">

                                <label>Nome</label>
                                <input type="text"
                                       id="nome"
                                       th:field="*{nome}"
                                       class="form-control mb-1">
                                <div id="erroNome" class="erro mb-2"></div>

                                <label>Sobrenome</label>
                                <input type="text"
                                       id="sobrenome"
                                       th:field="*{sobrenome}"
                                       class="form-control mb-1">
                                <div id="erroSobrenome" class="erro mb-2"></div>

                                <label>Login</label>
                                <input type="text"
                                       id="login"
                                       th:field="*{login}"
                                       class="form-control mb-1">
                                <div id="erroLogin" class="erro mb-2"></div>

                                <label>Senha</label>
                                <div class="input-group mb-1">
                                    <input type="password"
                                           id="senha"
                                           th:field="*{senha}"
                                           class="form-control">

                                    <button type="button"
                                            id="toggleSenha"
                                            class="btn btn-outline-secondary">
                                        Mostrar
                                    </button>
                                </div>
                                <div id="erroSenha" class="erro mb-2"></div>

                                <label>Cargo</label>
                                <select id="cargo"
                                        th:field="*{cargo}"
                                        class="form-select mb-1">

                                    <option value="">Selecione</option>
                                    <option value="administrador">Administrador</option>
                                    <option value="atendente">Atendente</option>
                                    <option value="gerente">Gerente</option>

                                </select>
                                <div id="erroCargo" class="erro mb-3"></div>

                                <div class="form-check mb-3">

                                    <input type="checkbox"
                                           th:field="*{ativo}"
                                           class="form-check-input">

                                    <label class="form-check-label">
                                        Usuário Ativo
                                    </label>

                                </div>

                                <div class="d-flex gap-2">

                                    <a th:href="@{/usuarios}"
                                       class="btn btn-secondary w-100">
                                        Cancelar
                                    </a>

                                    <button type="submit"
                                            class="btn btn-primary w-100">
                                        Salvar
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </main>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script th:src="@{/js/ui.js}"></script>
        <script th:src="@{/js/usuario-form.js}"></script>

    </body>
</html>
