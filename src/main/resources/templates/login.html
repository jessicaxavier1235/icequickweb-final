<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - IceQuick</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="login-body d-flex justify-content-center align-items-center min-vh-100">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                    <div class="card-sistema p-4 text-center">

                        <div class="mb-3">
                            <img th:src="@{/img/logo.png}"
                                 class="img-fluid"
                                 style="max-width: 90px;"
                                 alt="Logo da sorveteria IceQuick">
                        </div>

                        <h2 class="titulo mb-3">
                            Login
                        </h2>

                        <div th:if="${erro}"
                             class="alert alert-danger">

                            <span th:text="${erro}"></span>

                        </div>

                        <form th:action="@{/login}"
                              method="post"
                              class="formulario text-start">

                            <label class="form-label">
                                Login
                            </label>

                            <input type="text"
                                   name="login"
                                   class="form-control mb-3"
                                   placeholder="Digite seu login">

                            <label class="form-label">
                                Senha
                            </label>

                            <input type="password"
                                   name="senha"
                                   class="form-control mb-3"
                                   placeholder="Digite sua senha">

                            <div class="d-grid">

                                <button type="submit"
                                        class="btn-pink">

                                    ENTRAR

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </body>

</html>
