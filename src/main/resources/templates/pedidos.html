<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pedidos</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu ativo"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}" class="sidebar-logo" alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="card-sistema p-3 p-md-4">

                    <h1 class="titulo mb-3">Pedidos</h1>

                    <div class="row g-3">

                        <!-- PRODUTOS -->
                        <div class="col-12 col-lg-6">

                            <div class="produtos-area card-area h-100">

                                <div class="area-header">
                                    <h2>🍦 Produtos disponíveis</h2>
                                </div>

                                <div class="area-body">
                                    <div class="table-responsive">

                                        <table class="table table-hover align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Produto</th>
                                                    <th class="text-end">Preço</th>
                                                </tr>
                                            </thead>

                                            <tbody>
                                                <tr th:each="produto : ${produtos}"
                                                    class="produto-item"
                                                    th:data-id="${produto.id}"
                                                    th:data-nome="${produto.nome}"
                                                    th:data-preco="${produto.preco}"
                                                    style="cursor:pointer;">

                                                    <td th:text="${produto.nome}"></td>

                                                    <td class="text-end">
                                                        R$
                                                        <span th:text="${#numbers.formatDecimal(produto.preco,1,2)}"></span>
                                                    </td>

                                                </tr>
                                            </tbody>
                                        </table>

                                    </div>
                                </div>

                            </div>

                        </div>

                        <div class="col-12 col-lg-6">

                            <div class="carrinho-area card-area destaque h-100">

                                <div class="area-header">
                                    <h2>🛒 Carrinho</h2>
                                </div>

                                <div class="carrinho-tabela">
                                    <div class="table-responsive">

                                        <table class="table">
                                            <thead>
                                                <tr>
                                                    <th>Produto</th>
                                                    <th>Qtd</th>
                                                    <th>Subtotal</th>
                                                </tr>
                                            </thead>

                                            <tbody id="itensCarrinho">
                                                <tr class="carrinho-vazio">
                                                    <td colspan="3">Seu carrinho está vazio</td>
                                                </tr>
                                            </tbody>
                                        </table>

                                    </div>
                                </div>

                                <div class="carrinho-bottom mt-3">

                                    <div class="total-box mb-2">
                                        <span>Total</span>
                                        <strong>R$ <span id="total">0.00</span></strong>
                                    </div>

                                    <button id="btnLimparCarrinho" class="btn-cancelar w-100 mb-2">
                                        LIMPAR
                                    </button>

                                    <div class="pagamento mb-2">
                                        <label>Forma de pagamento</label>

                                        <select id="formaPagamento" class="form-select">
                                            <option value="">Selecione</option>
                                            <option>Dinheiro</option>
                                            <option>Débito</option>
                                            <option>Crédito</option>
                                            <option>VR/VA</option>
                                            <option>PIX</option>
                                        </select>
                                    </div>

                                    <button id="btnFinalizar" class="btn-pink w-100">
                                        FINALIZAR PEDIDO
                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </main>

      
        <div id="modalConfirmacao" class="modal">
            <div class="modal-content">
                <h2 id="modalTexto">Confirmação</h2>

                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button id="btnSim" class="btn-pink">SIM</button>
                    <button id="btnNao" class="btn-cancelar">NÃO</button>
                </div>
            </div>
        </div>

      
        <div id="modalResumo" class="modal">
            <div class="modal-content">
                <h2>Resumo do Pedido</h2>

                <div id="resumoPedido" class="resumo-container"></div>

                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button id="btnConfirmarPedido" class="btn-pink">CONFIRMAR</button>
                    <button id="btnCancelarPedido" class="btn-cancelar">CANCELAR</button>
                </div>
            </div>
        </div>

      
        <div id="cupomPrint"></div>

       
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script th:src="@{/js/ui.js}"></script>
        <script th:src="@{/js/carrinho.js}"></script>

        <script>
            $(document).on("click", ".produto-item", function () {

                let produto = {
                    id: parseInt($(this).attr("data-id")),
                    nome: $(this).attr("data-nome"),
                    preco: parseFloat($(this).attr("data-preco"))
                };

                adicionarCarrinho(produto);
            });
        </script>

    </body>
</html>
