<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Usuários</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu ativo"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}"
                     class="sidebar-logo"
                     alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="card-sistema p-3 p-md-4">

                    <h1 class="titulo mb-3">
                        Lista de Usuários
                    </h1>

                    <form method="get" th:action="@{/usuarios}">

                        <div class="row g-3 mb-3">

                            <div class="col-12 col-md-6">

                                <label class="form-label">
                                    Pesquisar
                                </label>

                                <input type="text"
                                       name="busca"
                                       th:value="${busca}"
                                       class="form-control"
                                       onkeyup="this.form.submit()">

                            </div>

                            <div class="col-12 col-md-4 d-flex align-items-center">

                                <input type="checkbox"
                                       name="mostrarInativos"
                                       value="true"
                                       th:checked="${mostrarInativos}"
                                       class="form-check-input me-2"
                                       onchange="this.form.submit()">

                                <label>
                                    Mostrar inativos
                                </label>

                            </div>

                        </div>

                    </form>

                    <div class="table-responsive">

                        <table class="table table-hover">

                            <thead class="table-light">

                                <tr>
                                    <th>Nome</th>
                                    <th>Sobrenome</th>
                                    <th>Login</th>
                                    <th>Cargo</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>

                            </thead>

                            <tbody>

                                <tr th:each="usuario : ${usuarios}">

                                    <td th:text="${usuario.nome}"></td>

                                    <td th:text="${usuario.sobrenome}"></td>

                                    <td th:text="${usuario.login}"></td>

                                    <td th:text="${usuario.cargo}"></td>

                                    <td>

                                        <span th:if="${usuario.ativo}"
                                              class="status-ativo">
                                            Ativo
                                        </span>

                                        <span th:unless="${usuario.ativo}"
                                              class="status-inativo">
                                            Inativo
                                        </span>

                                    </td>

                                    <td>

                                        <div class="d-flex gap-2">

                                            <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}"
                                               class="btn btn-sm btn-primary">
                                                Alterar
                                            </a>

                                            <a th:if="${usuario.ativo}"
                                               th:href="@{/usuarios/desativar/{id}(id=${usuario.id})}"
                                               class="btn btn-sm btn-danger">
                                                Desativar
                                            </a>

                                            <a th:unless="${usuario.ativo}"
                                               th:href="@{/usuarios/reativar/{id}(id=${usuario.id})}"
                                               class="btn btn-sm btn-success">
                                                Reativar
                                            </a>

                                        </div>

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                    <div class="mt-3">

                        <a th:href="@{/usuarios/novo}"
                           class="btn-pink text-decoration-none px-4 py-2">
                            CADASTRAR
                        </a>

                    </div>

                </div>

            </div>

        </main>

    </body>
</html>
