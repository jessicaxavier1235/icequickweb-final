<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Produtos</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu ativo"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}"
                     class="sidebar-logo"
                     alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="card-sistema p-3 p-md-4">

                    <h1 class="titulo mb-3">Lista de Produtos</h1>

                    <form method="get" th:action="@{/produtos}">

                        <div class="row g-3 mb-3">

                            <div class="col-12 col-md-6">
                                <label class="form-label">Pesquisar</label>

                                <input type="text"
                                       name="busca"
                                       th:value="${busca}"
                                       class="form-control"
                                       onkeyup="this.form.submit()">
                            </div>

                            <div class="col-12 col-md-4 d-flex align-items-center">

                                <input type="checkbox"
                                       name="mostrarInativos"
                                       value="true"
                                       th:checked="${mostrarInativos}"
                                       class="form-check-input me-2"
                                       onchange="this.form.submit()">

                                <label>Mostrar inativos</label>

                            </div>

                        </div>

                    </form>

                    <div class="tabela-area">

                        <div class="table-responsive">

                            <table class="table table-hover">

                                <thead class="table-light">
                                    <tr>
                                        <th>Nome</th>
                                        <th class="text-end">Preço</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>

                                <tbody>

                                    <tr th:each="produto : ${produtos}">

                                        <td th:text="${produto.nome}"></td>

                                        <td class="text-end">
                                            R$ <span th:text="${#numbers.formatDecimal(produto.preco,1,2)}"></span>
                                        </td>

                                        <td class="text-center">

                                            <span th:if="${produto.ativo}"
                                                  class="status-ativo">
                                                Ativo
                                            </span>

                                            <span th:unless="${produto.ativo}"
                                                  class="status-inativo">
                                                Inativo
                                            </span>

                                        </td>

                                        <td class="d-flex gap-2">

                                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}"
                                               class="btn btn-primary btn-sm">
                                                Alterar
                                            </a>

                                            <a th:if="${produto.ativo}"
                                               th:href="@{/produtos/desativar/{id}(id=${produto.id})}"
                                               class="btn btn-outline-danger btn-sm">
                                                Desativar
                                            </a>

                                            <a th:unless="${produto.ativo}"
                                               th:href="@{/produtos/reativar/{id}(id=${produto.id})}"
                                               class="btn btn-outline-success btn-sm">
                                                Reativar
                                            </a>

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                    <div class="acoes mt-3">

                        <div class="acoes-principais d-flex flex-column flex-md-row gap-2">

                            <a th:href="@{/produtos/novo}"
                               class="btn-pink w-100 text-center text-decoration-none">
                                CADASTRAR
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </main>

    </body>
</html>
