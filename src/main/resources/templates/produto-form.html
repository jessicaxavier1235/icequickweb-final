<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro de Produto</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="sistema-body">

        <aside class="sidebar">

            <div class="menu-top">

                <a id="menuPedidos"
                   class="btn-menu"
                   th:href="@{/pedidos}">
                    PEDIDOS
                </a>

                <a id="menuProdutos"
                   class="btn-menu ativo"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/produtos}">
                    PRODUTOS
                </a>

                <a id="menuUsuarios"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   session.usuarioLogado.cargo == 'administrador'}"
                   th:href="@{/usuarios}">
                    USUÁRIOS
                </a>

                <a id="menuRelatorio"
                   class="btn-menu"
                   th:if="${session.usuarioLogado != null and 
                   (session.usuarioLogado.cargo == 'gerente' or session.usuarioLogado.cargo == 'administrador')}"
                   th:href="@{/relatorio}">
                    RELATÓRIO
                </a>

                <a class="btn-sair"
                   th:href="@{/logout}">
                    SAIR
                </a>

            </div>

            <div class="menu-bottom">
                <img th:src="@{/img/logo.png}"
                     class="sidebar-logo"
                     alt="Logo">
            </div>

        </aside>

        <main class="main-content">

            <div class="container-fluid">

                <div class="row justify-content-center">

                    <div class="col-12 col-md-8 col-lg-6">

                        <div class="card-sistema p-3 p-md-4">

                            <h1 class="titulo mb-3 text-center">
                                Cadastro de Produto
                            </h1>

                            <div th:if="${erro}"
                                 class="alert alert-danger text-center"
                                 th:text="${erro}">
                            </div>

                            <form id="formProduto"
                                  th:action="@{/produtos/salvar}"
                                  th:object="${produto}"
                                  method="post"
                                  novalidate>

                                <input type="hidden" th:field="*{id}">

                                <label class="form-label mt-2">
                                    Produto
                                </label>

                                <input type="text"
                                       id="nomeProduto"
                                       th:field="*{nome}"
                                       class="form-control mb-3">

                                <label class="form-label">
                                    Preço
                                </label>

                                <input type="number"
                                       id="precoProduto"
                                       step="0.01"
                                       min="0.01"
                                       th:field="*{preco}"
                                       class="form-control mb-3">

                                <div class="form-check mb-3">

                                    <input type="checkbox"
                                           th:field="*{ativo}"
                                           class="form-check-input">

                                    <label class="form-check-label">
                                        Produto Ativo
                                    </label>

                                </div>

                                <div class="acoes-form d-flex flex-column flex-md-row gap-2 mt-3">

                                    <a th:href="@{/produtos}"
                                       class="btn-cancelar w-100 text-center text-decoration-none">
                                        Cancelar
                                    </a>

                                    <button type="submit"
                                            class="btn-pink w-100">
                                        Salvar
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </main>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script th:src="@{/js/ui.js}"></script>
        <script th:src="@{/js/produto-form.js}"></script>

    </body>
</html>
